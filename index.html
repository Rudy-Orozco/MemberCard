<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Club — Membership</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/style.css"/>
</head>
<body>

  <!-- ── SIGNUP FORM ── -->
  <div id="form-overlay">
    <div class="card-form">

      <div class="form-header">
        <h1 class="form-header-title">BL Book Club Sign up</h1>
        <p class="form-header-sub">Fill in your details to receive your card</p>
      </div>

      <div class="form-body">

        <div class="field-group">
          <label class="field-label">Card Style</label>
          <div class="style-picker" id="style-picker">
            <!-- Populated by main.js from CARD_STYLES -->
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Full Name <span class="req">*</span></label>
          <input class="field-input" id="f-name" placeholder="Jane Doe"/>
        </div>

        <div class="field-group">
          <label class="field-label">Favourite Book</label>
          <input class="field-input" id="f-book" placeholder="e.g. Anything tbh..."/>
        </div>

        <div class="field-group">
          <label class="field-label">Issued Date</label>
          <div class="id-display" id="f-date-display"></div>
          <input type="hidden" id="f-date"/>
        </div>

        <div class="field-group">
          <label class="field-label">Member ID <span class="field-note">— auto-generated from name</span></label>
          <div class="id-display" id="id-display">—</div>
        </div>

        <div class="field-group">
          <label class="field-label">ID Photo <span class="field-note">(optional)</span></label>
          <div class="photo-upload" id="photo-upload">
            <div class="photo-upload-inner">
              <div class="photo-placeholder" id="photo-placeholder">
                <span class="photo-icon">↑</span>
                <span class="photo-text">Click to upload a photo</span>
              </div>
              <img id="photo-preview" class="photo-preview-img" style="display:none"/>
            </div>
            <input type="file" id="f-photo" accept="image/*" style="display:none"/>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Art Credit <span class="field-note"></span></label>
          <input class="field-input" id="f-credits" placeholder="e.g. Artist Name"/>
        </div>

        <button class="signup-btn" id="signup-btn">Issue My Card</button>

      </div>
    </div>
  </div>

  <!-- ── CROP MODAL ── -->
  <div id="crop-modal">
    <div id="crop-box">
      <div id="crop-header">
        <span>Adjust Photo</span>
        <span class="crop-header-hint">Drag to reposition · Scroll to zoom</span>
      </div>
      <div id="crop-img-wrap">
        <img id="crop-img"/>
      </div>
      <div id="crop-actions">
        <button id="crop-cancel">Cancel</button>
        <button id="crop-confirm">Use Photo</button>
      </div>
    </div>
  </div>

  <!-- ── WEBGL ── -->
  <canvas id="gl"></canvas>

  <div id="welcome">
    <h2>Welcome, <span id="wname">Member</span>.</h2>
    <p>Your membership card has been issued</p>
  </div>

  <div id="hud">
    <div class="hud-hint">Click to examine &nbsp;·&nbsp; move mouse to rotate &nbsp;·&nbsp; click to flip &nbsp;·&nbsp; double-click to set down</div>
    <button class="save-btn" id="save-btn">↓ Save Card as PNG</button>
  </div>

  <!-- Hidden texture canvases -->
  <canvas id="tc-front" width="1024" height="576"></canvas>
  <canvas id="tc-back"  width="1024" height="576"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
